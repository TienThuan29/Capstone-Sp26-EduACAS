server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (uncomment when SSL is ready)
    # return 301 https://$host$request_uri;

    # ─── Frontend (Next.js SPA) ──────────────────────────────────
    location / {
        proxy_pass         http://web-app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── API Gateway ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api-gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Swagger UI (AcasService) ─────────────────────────────────
    location /swagger/acas/ {
        proxy_pass         http://acas-service:8002/swagger/v1/swagger.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Swagger UI (AuthService) ─────────────────────────────────
    location /swagger/auth/ {
        proxy_pass         http://auth-service:8081/swagger/v1/swagger.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket / SignalR ──────────────────────────────────────
    location /hubs/ {
        proxy_pass         http://acas-service:8002/api/v1/hubs/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
