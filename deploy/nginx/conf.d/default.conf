# ─── HTTP Server (redirect to HTTPS) ───────────────────────────
server {
    listen 80;
    server_name edu-acas.site;

    location / {
        return 301 https://$host$request_uri;
    }

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
}

# ─── HTTPS Server ──────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name edu-acas.site;

    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # ─── Frontend (Next.js SPA) ──────────────────────────────────
    location / {
        proxy_pass         http://web-app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ─── Next.js API Routes (syntax-check, etc.) ───────────────
    # Must come BEFORE /api/ to avoid being proxied to the .NET backend

    # Exact match: catches /api/syntax-check (no trailing slash) — handles POST redirect fallback
    location = /api/syntax-check {
        proxy_pass         http://web-app:3000/api/syntax-check;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /api/syntax-check/ {
        proxy_pass         http://web-app:3000/api/syntax-check/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket / SignalR (bypass API Gateway - direct to ACAS service) ──
    location /api/acas/v1/hubs/ {
        proxy_pass         http://acas-service:8002/api/v1/hubs/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── API Gateway ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://api-gateway:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Swagger UI (AcasService) ─────────────────────────────────
    location /swagger/acas/ {
        proxy_pass         http://acas-service:8002/swagger/v1/swagger.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── Swagger UI (AuthService) ─────────────────────────────────
    location /swagger/auth/ {
        proxy_pass         http://auth-service:8081/swagger/v1/swagger.json;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ─── WebSocket / SignalR ──────────────────────────────────────
    location /hubs/ {
        proxy_pass         http://acas-service:8002/api/v1/hubs/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
