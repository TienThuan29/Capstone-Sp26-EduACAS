services:

  # ─── Infrastructure ────────────────────────────────────────────

  redis:
    image: redis:7-alpine
    container_name: acas-redis
    hostname: redis
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_pass}", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - acas-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: acas-rabbitmq
    hostname: rabbitmq
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VIRTUAL_HOST}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - acas-network
    restart: unless-stopped

  # ─── Backend Services (.NET) ────────────────────────────────────

  api-gateway:
    build:
      context: ./servers
      dockerfile: ApiGateway/Dockerfile
    container_name: acas-api-gateway
    expose:
      - "8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      Services__AuthService__BaseUrl: http://auth-service:8081
      Services__AcasService__BaseUrl: http://acas-service:8002
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - acas-network
    restart: unless-stopped

  auth-service:
    build:
      context: ./servers
      dockerfile: Services/AuthService/Dockerfile
    container_name: acas-auth-service
    expose:
      - "8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8081
      Redis__ConnectionString: redis:${REDIS_PORT:-6379},password=${REDIS_PASSWORD:-redis_secure_pass}
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: ${RABBITMQ_PORT}
      RabbitMQ__UserName: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__VirtualHost: ${RABBITMQ_VIRTUAL_HOST}
      Cors__CorsOrigin: ${FRONTEND_URL}
      Cors__GatewayOrigin: http://acas-api-gateway:8080
      Jwt__JwtSecret: ${JWT_SECRET}
      Jwt__JwtAccessTokenExpiration: ${JWT_ACCESS_TOKEN_EXPIRATION}
      Jwt__JwtRefreshTokenExpiration: ${JWT_REFRESH_TOKEN_EXPIRATION}
      Jwt__BcryptSaltRounds: ${BCRYPT_SALT_ROUNDS}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      HashingSecretKey: ${HASHING_SECRET_KEY}
      AWS__Region: ${AWS_REGION}
      AWS__AccessKey: ${AWS_ACCESS_KEY}
      AWS__SecretKey: ${AWS_SECRET_KEY}
      DynamoDB__UserTable: ${DYNAMODB_USER_TABLE}
      S3__PublicBucketName: ${S3_PUBLIC_BUCKET}
      Email__From: ${SMTP_FROM_ADDRESS}
      Email__SmtpHost: ${SMTP_HOST}
      Email__SmtpPort: ${SMTP_PORT}
      Email__User: ${SMTP_USERNAME}
      Email__Password: ${SMTP_PASSWORD}
      Email__UseSsl: ${SMTP_ENABLE_SSL}
      FrontendUrl: ${FRONTEND_URL}
      Google__ClientId: ${GOOGLE_CLIENT_ID}
      Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      RateLimiting__GlobalPolicy__PermitLimit: "100"
      RateLimiting__GlobalPolicy__Window: "00:01:00"
      RateLimiting__GlobalPolicy__QueueLimit: "0"
      RateLimiting__AuthPolicy__PermitLimit: "10"
      RateLimiting__AuthPolicy__Window: "00:01:00"
      RateLimiting__AuthPolicy__QueueLimit: "0"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - acas-network
    restart: unless-stopped

  acas-service:
    build:
      context: ./servers
      dockerfile: Services/AcasService/Dockerfile
    container_name: acas-service
    expose:
      - "8002"
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8002
      Cors__CorsOrigin: ${FRONTEND_URL}
      Cors__GatewayOrigin: http://acas-api-gateway:8080
      Redis__ConnectionString: redis:${REDIS_PORT:-6379},password=${REDIS_PASSWORD:-redis_secure_pass}
      RabbitMQ__HostName: rabbitmq
      RabbitMQ__Port: ${RABBITMQ_PORT}
      RabbitMQ__UserName: ${RABBITMQ_USERNAME}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD}
      RabbitMQ__VirtualHost: ${RABBITMQ_VIRTUAL_HOST}
      AWS__Region: ${AWS_REGION}
      AWS__AccessKey: ${AWS_ACCESS_KEY}
      AWS__SecretKey: ${AWS_SECRET_KEY}
      DynamoDB__ClassroomTableName: ${DYNAMODB_CLASSROOM_TABLE}
      DynamoDB__ClassroomEnrollmentTableName: ${DYNAMODB_CLASSROOM_ENROLLMENT_TABLE}
      DynamoDB__CommentTableName: ${DYNAMODB_COMMENT_TABLE}
      DynamoDB__DiscussionIssueTableName: ${DYNAMODB_DISCUSSION_ISSUE_TABLE}
      DynamoDB__ExaminationTableName: ${DYNAMODB_EXAMINATION_TABLE}
      DynamoDB__MaterialTableName: ${DYNAMODB_MATERIAL_TABLE}
      DynamoDB__ProblemTableName: ${DYNAMODB_PROBLEM_TABLE}
      DynamoDB__ProgrammingLanguageTableName: ${DYNAMODB_PROGRAMMING_LANGUAGE_TABLE}
      DynamoDB__RegradingRequestTableName: ${DYNAMODB_REGRADING_REQUEST_TABLE}
      DynamoDB__SlotTableName: ${DYNAMODB_SLOT_TABLE}
      DynamoDB__SubjectTableName: ${DYNAMODB_SUBJECT_TABLE}
      DynamoDB__SubmissionTableName: ${DYNAMODB_SUBMISSION_TABLE}
      DynamoDB__NotificationTableName: ${DYNAMODB_NOTIFICATION_TABLE}
      DynamoDB__KeystrokeLogsTableName: ${DYNAMODB_KEYSTROKE_LOGS_TABLE}
      DynamoDB__UserDeviceTableName: ${DYNAMODB_USER_DEVICE_TABLE}
      DynamoDB__QuizTableName: ${DYNAMODB_QUIZ_TABLE}
      DynamoDB__QuestionTableName: ${DYNAMODB_QUESTION_TABLE}
      DynamoDB__AnswerOptionTableName: ${DYNAMODB_ANSWER_OPTION_TABLE}
      DynamoDB__ClassroomQuizTableName: ${DYNAMODB_CLASSROOM_QUIZ_TABLE}
      DynamoDB__QuizAttemptTableName: ${DYNAMODB_QUIZ_ATTEMPT_TABLE}
      DynamoDB__StudentAnswerTableName: ${DYNAMODB_STUDENT_ANSWER_TABLE}
      DynamoDB__ErrorGroupTableName: ${DYNAMODB_ERROR_GROUP_TABLE}
      DynamoDB__ExamLogTableName: ${DYNAMODB_EXAM_LOG_TABLE}
      DynamoDB__StudentExamSessionTableName: ${DYNAMODB_STUDENT_EXAM_SESSION_TABLE}
      DynamoDB__ExaminationTemplateTableName: ${DYNAMODB_EXAMINATION_TEMPLATE_TABLE}
      DynamoDB__AcademicWarningTableName: ${DYNAMODB_ACADEMIC_WARNING_TABLE}
      S3__PublicBucketName: ${S3_PUBLIC_BUCKET}
      S3__PrivateBucketName: ${S3_PRIVATE_BUCKET}
      Jwt__JwtSecret: ${JWT_SECRET}
      Jwt__Issuer: ${JWT_ISSUER}
      Jwt__Audience: ${JWT_AUDIENCE}
      Dev__UserTableName: ${DYNAMODB_USER_TABLE}
      Dev__HashingSecretKey: ${HASHING_SECRET_KEY}
      CodeRunner__BaseUrl: http://code-runner:5000
      Gemini__ModelName: ${GEMINI_MODEL_NAME}
      Gemini__ApiKey: ${GEMINI_API_KEY}
      AzureFormRecognizer__Endpoint: ${AZURE_FORM_RECOGNIZER_ENDPOINT}
      AzureFormRecognizer__ApiKey: ${AZURE_FORM_RECOGNIZER_API_KEY}
      Smtp__Host: ${SMTP_HOST}
      Smtp__Port: ${SMTP_PORT}
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS}
      Smtp__FromName: ${SMTP_FROM_NAME}
      Smtp__EnableSsl: ${SMTP_ENABLE_SSL}
      Smtp__UseDefaultCredentials: ${SMTP_USE_DEFAULT_CREDENTIALS}
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - acas-network
    restart: unless-stopped

  # ─── Code Runner (Node.js) ──────────────────────────────────────

  code-runner:
    image: ${CODERUNNER_IMAGE:-tienthuan29/code-runner-nestjs:latest}
    container_name: acas-code-runner
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
    networks:
      - acas-network
    restart: unless-stopped

  # ─── Frontend (Next.js) ─────────────────────────────────────────

  web-app:
    build:
      context: .
      dockerfile: web_app/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_BASE_URL: ${NEXT_PUBLIC_BACKEND_BASE_URL}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    container_name: acas-web-app
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_BACKEND_BASE_URL: ${NEXT_PUBLIC_BACKEND_BASE_URL}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID}
    networks:
      - acas-network
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────

  nginx:
    build:
      context: ./deploy/nginx
      dockerfile: Dockerfile
    container_name: acas-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - ./deploy/certbot:/var/www/certbot:ro
    depends_on:
      - api-gateway
      - web-app
    networks:
      - acas-network
    restart: unless-stopped

# ─── Volumes & Networks ───────────────────────────────────────────

volumes:
  rabbitmq_data:
    driver: local
  redis_data:
    driver: local

networks:
  acas-network:
    driver: bridge
